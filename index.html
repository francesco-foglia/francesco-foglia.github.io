<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Francesco Foglia | Developer</title>

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <!-- Hover.css -->
  <link rel="stylesheet" href="css/hover-min.css">
  <!-- Animate On Scroll Library -->
  <link rel="stylesheet" href="css/aos.css">
  <!-- My style -->
  <link rel="stylesheet" href="css/app.css">

  <!-- Favicon -->
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
  <!-- <link rel="manifest" href="favicon/site.webmanifest"> -->
  <link rel="mask-icon" href="favicon/safari-pinned-tab.svg" color="#5bbad5">
  <meta name="msapplication-TileColor" content="#da532c">
  <meta name="theme-color" content="#ffffff">
</head>

<body>

  <!-- Header -->
  <header>
    <div class="header-md container-fluid d-none d-md-block">
      <nav id="navbar" class="container">
        <!-- Navigation links rendered with JavaScript -->
      </nav>
    </div>

    <!-- Button to open the navigation menu on mobile -->
    <div class="d-block d-md-none">
      <button id="openbtn">
        <img src="img/bars.svg" alt="Bars">
      </button>
    </div>

    <!-- Navigation menu on mobile -->
    <aside id="aside" class="">
      <!-- Button to close the navigation menu on mobile -->
      <a href="javascript:void(0)" id="closebtn">
        <img src="img/xmark.svg" alt="Xmark">
      </a>

      <!-- Navigation links rendered with JavaScript -->
    </aside>
  </header>

  <!-- Main -->
  <main class="container-fluid px-0">
    <!-- Developer -->
    <section id="developer" class="py-5">
      <div class="pt-md-5">
        <h1 data-aos="zoom-out" data-aos-delay="100">
          <a href="#contacts" class="display-4 mb-5 name hvr-float">Francesco Foglia</a> <br>
          <a href="#skills" class="mb-5 hvr-float">Front End Developer</a> <br>
          <span>Florence, Italy</span>
        </h1>
      </div>
    </section>
    <!-- Skills -->
    <section id="skills" class="py-5">
      <div class="pt-md-5">
        <h2 class="display-4 mb-5" data-aos="zoom-out" data-aos-delay="100">
          Skills
        </h2>
        <div id="skills-container">
          <!-- Skills images rendered with JavaScript -->
        </div>
      </div>
    </section>
    <!-- Contacts -->
    <section id="contacts" class="py-5">
      <div class="pt-md-5">
        <h2 class="display-4 mb-5" data-aos="zoom-out" data-aos-delay="100">
          Contacts
        </h2>
        <div id="contacts-container">
          <!-- Contacts images rendered with JavaScript -->
        </div>
      </div>
    </section>
  </main>

  <!-- Scroll to top button -->
  <button id="scroll-to-top" class="">
    <img src="img/chevron-up.svg" alt="Chevron up">
  </button>

  <!-- Animate On Scroll Library -->
  <script src="js/aos.js"></script>
  <!-- My script -->
  <script src="js/script.js"></script>
</body>

</html>
